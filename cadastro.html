<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cadastro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        nav {
            width: 250px;
            background-color: #1f1f1f;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        nav h2 {
            color: #03dac6;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            margin-bottom: 10px;
        }

        nav ul li a {
            color: #bbb;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            background-color: #333;
            color: #03dac6;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #03dac6;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #bbb;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
            box-sizing: border-box;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save {
            background-color: #03dac6;
            color: #000;
        }

        .btn-save:hover {
            background-color: #00bfa5;
        }

        .btn-cancel {
            background-color: #444;
            color: #fff;
        }

        .btn-cancel:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <nav>
        <h2>Sistema</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="cadastro.html" style="color: #03dac6;">Novo Cadastro</a></li>
            <li><a href="#">Relatórios</a></li>
            <li><a href="#">Configurações</a></li>
        </ul>
    </nav>

    <main>
        <div class="form-container">
            <h1>Novo Cadastro</h1>
            <form id="formCadastro">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>

                <label>E-mail</label>
                <input type="email" id="email" required>

                <label>Categoria</label>
                <select id="categoria">
                    <option value="estudante">Estudante</option>
                    <option value="professor">Professor</option>
                    <option value="admin">Administrador</option>
                </select>

                <div class="button-group">
                    <button type="button" class="btn-cancel" onclick="voltar()">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('formCadastro').onsubmit = function(e) {
            e.preventDefault();
            alert('Cadastro realizado com sucesso!');
            window.location.href = 'dashboard.html';
        };

        function voltar() {
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
